<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语雀文档下载工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f7fa;
    color: #333;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #2d8c4a 0%, #1a6b34 100%);
    color: #fff;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
  .header .badge { font-size: 11px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
  .container { max-width: 800px; margin: 0 auto; padding: 24px 20px 40px; }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #555;
    margin-bottom: 6px;
  }
  .form-group .hint {
    font-size: 12px;
    color: #999;
    font-weight: 400;
    margin-left: 4px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fafafa;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    outline: none;
    border-color: #2d8c4a;
    box-shadow: 0 0 0 3px rgba(45,140,74,0.1);
    background: #fff;
  }
  .mode-selector {
    display: flex;
    gap: 8px;
  }
  .mode-btn {
    flex: 1;
    padding: 10px 12px;
    border: 1.5px solid #e0e0e0;
    background: #fafafa;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: #666;
    transition: all 0.2s;
    text-align: center;
  }
  .mode-btn:hover { border-color: #2d8c4a; color: #2d8c4a; }
  .mode-btn.active {
    background: #eaf7ee;
    border-color: #2d8c4a;
    color: #2d8c4a;
    font-weight: 600;
  }
  .checkbox-group { display: flex; gap: 20px; flex-wrap: wrap; }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: #555;
    cursor: pointer;
  }
  .checkbox-item input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: #2d8c4a;
    cursor: pointer;
  }
  .url-row { display: none; }
  .url-row.visible { display: block; }
  .actions { margin-top: 20px; display: flex; gap: 12px; }
  .btn {
    padding: 10px 28px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #2d8c4a 0%, #1a6b34 100%);
    color: #fff;
    box-shadow: 0 2px 8px rgba(45,140,74,0.3);
  }
  .btn-primary:hover { box-shadow: 0 4px 12px rgba(45,140,74,0.4); transform: translateY(-1px); }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .btn-secondary {
    background: #f0f0f0;
    color: #555;
  }
  .btn-secondary:hover { background: #e5e5e5; }
  .log-panel {
    background: #1e1e1e;
    border-radius: 10px;
    padding: 16px;
    height: 320px;
    overflow-y: auto;
    font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: #d4d4d4;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-panel .log-line { animation: fadeIn 0.15s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .log-panel::-webkit-scrollbar { width: 6px; }
  .log-panel::-webkit-scrollbar-track { background: transparent; }
  .log-panel::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 13px;
    color: #888;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ccc;
  }
  .status-dot.running { background: #2d8c4a; animation: pulse 1s ease-in-out infinite; }
  .status-dot.done { background: #2d8c4a; }
  .status-dot.error { background: #e74c3c; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .dir-row {
    display: flex;
    gap: 8px;
  }
  .dir-row input { flex: 1; }
  .btn-browse {
    padding: 10px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    background: #fafafa;
    font-size: 13px;
    cursor: pointer;
    color: #555;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-browse:hover { border-color: #2d8c4a; color: #2d8c4a; background: #eaf7ee; }
  .token-warning {
    margin-top: 8px;
    padding: 8px 12px;
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 6px;
    font-size: 12px;
    color: #8d6e00;
    display: none;
  }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:24px;">📚</span>
  <h1>语雀文档下载工具</h1>
  <span class="badge">Web GUI</span>
</div>

<div class="container">
  <!-- 设置面板 -->
  <div class="card">
    <div class="card-title">⚙️ 下载设置</div>

    <div class="form-group">
      <label>Token <span class="hint">（从语雀 Cookie 获取 _yuque_session）</span></label>
      <input type="password" id="token" placeholder="粘贴你的 _yuque_session token...">
    </div>

    <div class="form-group">
      <label>下载模式</label>
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="all" onclick="switchMode('all')">📦 全部知识库</button>
        <button class="mode-btn" data-mode="kb" onclick="switchMode('kb')">📁 指定知识库</button>
        <button class="mode-btn" data-mode="doc" onclick="switchMode('doc')">📄 指定文档</button>
      </div>
    </div>

    <div class="form-group url-row" id="urlRow">
      <label>语雀 URL</label>
      <input type="text" id="url" placeholder="粘贴语雀知识库或文档的 URL...">
    </div>

    <div class="form-group">
      <label>选项</label>
      <div class="checkbox-group">
        <label class="checkbox-item" id="subOption" style="display:none">
          <input type="checkbox" id="withSub">
          含子文档
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="downloadImages">
          下载图片到本地（-i）
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>输出目录 <span class="hint">（默认: ./yuque_output）</span></label>
      <div class="dir-row">
        <input type="text" id="outputDir" placeholder="./yuque_output">
        <button class="btn-browse" id="browseBtn" onclick="selectDir()">📂 浏览</button>
      </div>
    </div>

    <div class="token-warning" id="tokenWarning">⚠️ 请先填写 Token</div>

    <div class="actions">
      <button class="btn btn-primary" id="downloadBtn" onclick="startDownload()">🚀 开始下载</button>
    </div>
  </div>

  <!-- 日志面板 -->
  <div class="card">
    <div class="card-title">📋 下载日志</div>
    <div class="log-panel" id="logPanel">
      <span style="color:#888;">等待开始下载...</span>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">就绪</span>
    </div>
  </div>
</div>

<script>
let currentMode = 'all';
let isRunning = false;
let eventSource = null;

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('urlRow').classList.toggle('visible', mode === 'kb' || mode === 'doc');
  document.getElementById('subOption').style.display = mode === 'doc' ? 'flex' : 'none';
}

async function selectDir() {
  const btn = document.getElementById('browseBtn');
  const orig = btn.textContent;
  btn.textContent = '⏳';
  btn.disabled = true;
  try {
    const resp = await fetch('/api/select-dir', { method: 'POST' });
    const data = await resp.json();
    if (data.path) {
      document.getElementById('outputDir').value = data.path;
    } else if (data.error) {
      addLog(`⚠️ 选择文件夹失败: ${data.error}`);
    }
  } catch (e) {
    addLog(`⚠️ 选择文件夹失败: ${e.message}`);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

function setStatus(status) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot';
  if (status === 'running') { dot.classList.add('running'); text.textContent = '下载中...'; }
  else if (status === 'done') { dot.classList.add('done'); text.textContent = '完成'; }
  else if (status === 'error') { dot.classList.add('error'); text.textContent = '出错'; }
  else { text.textContent = '就绪'; }
}

function addLog(msg) {
  const panel = document.getElementById('logPanel');
  // 清除初始占位文字
  if (panel.querySelector('span[style]')) panel.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'log-line';
  div.textContent = msg;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

async function startDownload() {
  const token = document.getElementById('token').value.trim();
  const url = document.getElementById('url').value.trim();
  const withSub = document.getElementById('withSub').checked;
  const downloadImages = document.getElementById('downloadImages').checked;
  const outputDir = document.getElementById('outputDir').value.trim();
  const warning = document.getElementById('tokenWarning');
  const btn = document.getElementById('downloadBtn');

  // 校验
  if (!token) {
    warning.style.display = 'block';
    return;
  }
  warning.style.display = 'none';

  if ((currentMode === 'kb' || currentMode === 'doc') && !url) {
    addLog('❌ 请填写语雀 URL');
    return;
  }

  if (isRunning) return;
  isRunning = true;
  btn.disabled = true;
  btn.textContent = '⏳ 下载中...';

  // 清空日志
  const panel = document.getElementById('logPanel');
  panel.innerHTML = '';
  setStatus('running');

  try {
    // 发起下载请求
    const resp = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, url, mode: currentMode, withSub, downloadImages, outputDir: outputDir || undefined }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      addLog(`❌ 请求失败: ${err.error}`);
      setStatus('error');
      isRunning = false;
      btn.disabled = false;
      btn.textContent = '🚀 开始下载';
      return;
    }

    const { taskId } = await resp.json();

    // 建立 SSE 连接获取实时日志
    eventSource = new EventSource(`/api/logs/${taskId}`);

    eventSource.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'log') {
        addLog(data.message);
      } else if (data.type === 'done') {
        setStatus(data.result?.error ? 'error' : 'done');
        eventSource.close();
        eventSource = null;
        isRunning = false;
        btn.disabled = false;
        btn.textContent = '🚀 开始下载';
        if (data.result?.outputDir) {
          addLog(`\n📁 文件保存在: ${data.result.outputDir}`);
        }
      }
    };

    eventSource.onerror = () => {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      addLog('⚠️ 日志连接断开');
      setStatus('done');
      isRunning = false;
      btn.disabled = false;
      btn.textContent = '🚀 开始下载';
    };
  } catch (e) {
    addLog(`❌ 网络错误: ${e.message}`);
    setStatus('error');
    isRunning = false;
    btn.disabled = false;
    btn.textContent = '🚀 开始下载';
  }
}
</script>
</body>
</html>
