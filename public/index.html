<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuque2md - 语雀文档下载</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
.header { padding: 16px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.header h1 { font-size: 18px; color: #e94560; white-space: nowrap; }
.token-input { flex: 1; padding: 10px 14px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 13px; outline: none; min-width: 0; }
.token-input:focus { border-color: #e94560; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
.btn-connect { background: #e94560; color: #fff; }
.btn-connect:hover { background: #d63851; }
.btn-connect.loading { opacity: .6; pointer-events: none; }
.btn-connect.done { background: #2ecc71; pointer-events: none; }
.main { flex: 1; display: flex; overflow: hidden; }
.tree-panel { width: 380px; flex-shrink: 0; overflow-y: auto; padding: 10px; border-right: 1px solid #0f3460; background: #16213e; }
.tree-panel::-webkit-scrollbar { width: 6px; }
.tree-panel::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
.log-panel { flex: 1; overflow-y: auto; padding: 12px; font-family: 'Consolas','Courier New',monospace; font-size: 12px; background: #0d1117; white-space: pre-wrap; line-height: 1.6; }
.log-panel::-webkit-scrollbar { width: 6px; }
.log-panel::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

.kb-card { padding: 10px 12px; margin-bottom: 6px; background: #1a1a2e; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
.kb-card:hover { border-color: #e94560; }
.kb-card.active { border-color: #e94560; }
.kb-card .icon { font-size: 20px; }
.kb-card .info { flex: 1; min-width: 0; }
.kb-card .name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kb-card .meta { font-size: 11px; color: #888; margin-top: 2px; }
.kb-card .expand { font-size: 18px; color: #888; flex-shrink: 0; transition: transform .15s; }
.kb-card .expand.open { transform: rotate(90deg); }

.tree-children { padding-left: 20px; display: none; }
.tree-children.expanded { display: block; }
.tree-node { display: flex; align-items: center; gap: 4px; padding: 3px 4px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.tree-node:hover { background: #1a1a2e; }
.tree-node .toggle { width: 16px; font-size: 10px; color: #888; text-align: center; flex-shrink: 0; user-select: none; }
.tree-node .toggle.leaf { visibility: hidden; }
.tree-node .cb { -webkit-appearance: none; width: 14px; height: 14px; border: 1.5px solid #555; border-radius: 3px; flex-shrink: 0; cursor: pointer; background: transparent; position: relative; }
.tree-node .cb:checked { background: #e94560; border-color: #e94560; }
.tree-node .cb:checked::after { content: '✓'; position: absolute; top: -1px; left: 2px; color: #fff; font-size: 10px; font-weight: bold; }
.tree-node .node-icon { flex-shrink: 0; font-size: 14px; }
.tree-node .node-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-node.folder .node-name { font-weight: 500; }

.toolbar { padding: 10px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.toolbar label { font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.toolbar label input { cursor: pointer; }
.toolbar .btn-dl { background: #e94560; color: #fff; min-width: 100px; }
.toolbar .btn-dl:hover { background: #d63851; }
.toolbar .btn-dl:disabled { opacity: .4; pointer-events: none; }
.toolbar .count { font-size: 12px; color: #888; min-width: 60px; }

.placeholder { color: #555; padding: 40px 20px; text-align: center; font-size: 14px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #0f3460; border-top-color: #e94560; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

.loading-tree { color: #888; padding: 8px 4px; font-size: 12px; }
</style>
</head>
<body>
<div class="header">
  <h1>yuque2md</h1>
  <input class="token-input" id="token" type="password" placeholder="粘贴语雀 _yuque_session token">
  <button class="btn btn-connect" id="btnConnect" onclick="connect()">连接</button>
</div>
<div class="main">
  <div class="tree-panel" id="treePanel">
    <div class="placeholder">👆 输入 Token 连接语雀账号</div>
  </div>
  <div class="log-panel" id="logPanel"></div>
</div>
<div class="toolbar">
  <label><input type="checkbox" id="chkRecursive" checked onchange="onRecursiveChange()"> 🔄 递归选择</label>
  <label><input type="checkbox" id="chkResources"> 📦 下载静态资源 (-r)</label>
  <span class="count" id="lblCount">已选 0 篇</span>
  <button class="btn btn-dl" id="btnDownload" onclick="startDownload()" disabled>下载已选文档</button>
</div>

<script>
let token = '';
let kbs = [];
let kbsData = {}; // bookId → { tree, kb }
let activeBookId = null;

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function log(msg) { const p = document.getElementById('logPanel'); p.textContent += msg + '\n'; p.scrollTop = p.scrollHeight; }

// ========== 连接 ==========
async function connect() {
  token = document.getElementById('token').value.trim();
  if (!token) return alert('请输入 Token');

  const btn = document.getElementById('btnConnect');
  btn.textContent = '连接中...'; btn.classList.add('loading');

  try {
    const resp = await fetch('/api/kbs', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error);
    kbs = data.kbs;
    btn.textContent = '已连接 ✓'; btn.classList.add('done');
    log('✅ 连接成功，共 ' + kbs.length + ' 个知识库');
    renderKbList();
  } catch (e) {
    btn.textContent = '重试'; btn.classList.remove('loading');
    log('❌ 连接失败: ' + e.message);
  }
}

// ========== 知识库列表 ==========
function renderKbList() {
  const panel = document.getElementById('treePanel');
  panel.innerHTML = kbs.map(kb => {
    const ns = kb.namespace || '?';
    return `<div class="kb-card" onclick="toggleKb(this, '${kb.id}', '${ns}', '${kb.slug}')">
      <span class="icon">📚</span>
      <span class="info"><div class="name">${esc(kb.name)}</div><div class="meta">${kb.items_count || '?'} 篇文档</div></span>
      <span class="expand" id="exp-${kb.id}">▶</span>
    </div>
    <div id="kb-${kb.id}" class="tree-children"></div>`;
  }).join('');
}

async function toggleKb(card, bookId, namespace, slug) {
  const container = document.getElementById('kb-' + bookId);
  const expandEl = document.getElementById('exp-' + bookId);

  if (container.classList.contains('expanded')) {
    container.classList.remove('expanded');
    expandEl.classList.remove('open');
    return;
  }

  document.querySelectorAll('.kb-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  activeBookId = bookId;

  if (!kbsData[bookId]) {
    container.innerHTML = '<div class="loading-tree"><span class="spinner"></span>加载文档树...</div>';
    container.classList.add('expanded');
    expandEl.classList.add('open');

    try {
      const kbUrl = 'https://www.yuque.com/' + namespace + '/' + slug;
      const resp = await fetch('/api/toc', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, kbUrl }),
      });
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error);
      kbsData[bookId] = { tree: data.tree, kb: data.kb };
      log('📖 已加载知识库 "' + data.kb.bookName + '"');
    } catch (e) {
      container.innerHTML = '<div class="placeholder">❌ ' + esc(e.message) + '</div>';
      return;
    }
  }

  container.innerHTML = renderTree(kbsData[bookId].tree, bookId);
  container.classList.add('expanded');
  expandEl.classList.add('open');
}

// ========== 递归渲染树 ==========
function renderTree(nodes, bookId) {
  return nodes.map(n => renderNode(n, bookId)).join('');
}

function renderNode(node, bookId) {
  const isDoc = node.type === 'DOC';
  const nodeId = bookId + '-' + node.uuid;
  const hasChildren = node.children && node.children.length > 0;

  let html = '<div class="tree-node' + (isDoc ? '' : ' folder') + '" data-uuid="' + node.uuid + '" data-book="' + bookId + '">';
  html += '<span class="toggle' + (hasChildren ? '' : ' leaf') + '" onclick="event.stopPropagation();toggleNode(\'' + nodeId + '\')">' + (hasChildren ? '▶' : '') + '</span>';
  html += '<input type="checkbox" class="cb" id="cb-' + nodeId + '" onchange="event.stopPropagation();onCheck(\'' + nodeId + '\')">';
  html += '<span class="node-icon">' + (isDoc ? '📄' : '📁') + '</span>';
  html += '<span class="node-name">' + esc(node.title) + (node.isDeduped ? ' <small style="color:#888">(' + node.uuid.slice(-8) + ')</small>' : '') + '</span>';
  html += '</div>';

  if (hasChildren) {
    html += '<div id="ch-' + nodeId + '" class="tree-children">' + renderTree(node.children, bookId) + '</div>';
  }

  return html;
}

// ========== 展开/折叠 ==========
function toggleNode(nodeId) {
  const children = document.getElementById('ch-' + nodeId);
  if (!children) return;
  const toggle = document.querySelector('#cb-' + nodeId).parentElement.querySelector('.toggle');

  if (children.classList.contains('expanded')) {
    children.classList.remove('expanded');
    if (toggle) toggle.textContent = '▶';
  } else {
    children.classList.add('expanded');
    if (toggle) toggle.textContent = '▼';
  }
}

// ========== 复选框 ==========
function onCheck(nodeId) {
  const cb = document.getElementById('cb-' + nodeId);
  if (!cb) return;
  const recursive = document.getElementById('chkRecursive').checked;

  if (recursive) {
    setChildrenCheckbox(nodeId, cb.checked);
  }
  updateParentCheckbox(nodeId);
  updateCount();
}

function setChildrenCheckbox(nodeId, checked) {
  const container = document.getElementById('ch-' + nodeId);
  if (!container) return;
  container.querySelectorAll('.cb').forEach(c => {
    c.checked = checked;
    // 递归
    const parentEl = c.closest('.tree-node');
    if (parentEl) {
      const parts = c.id.split('-');
      const childNodeId = parts.slice(0, -1).join('-') + '-' + parts[parts.length - 1];
      setChildrenCheckbox(childNodeId, checked);
    }
  });
}

function updateParentCheckbox(nodeId) {
  // 向上冒泡：如果所有兄弟都勾选了，勾选父节点
  const parts = nodeId.split('-');
  const uuid = parts[parts.length - 1];
  const bookId = parts[0];

  // 找到父容器
  const cb = document.getElementById('cb-' + nodeId);
  const nodeEl = cb ? cb.closest('.tree-node') : null;
  if (!nodeEl) return;

  // 向上找
  let parentContainer = nodeEl.closest('.tree-children');
  if (!parentContainer) return;

  // 父节点 ID
  const parentDiv = parentContainer.parentElement;
  const parentNode = parentDiv ? parentDiv.querySelector('.tree-node') : null;
  if (!parentNode) return;

  const parentCb = parentNode.querySelector('.cb');
  if (!parentCb) return;

  const siblingCbs = parentContainer.querySelectorAll(':scope > .tree-node > .cb, :scope > div > .tree-node > .cb');
  let allChecked = true;
  siblingCbs.forEach(c => { if (!c.checked) allChecked = false; });
  parentCb.checked = allChecked;

  // 继续向上
  const parentCbId = parentCb.id.replace('cb-', '');
  updateParentCheckbox(parentCbId);
}

function onRecursiveChange() {
  // 切换时不自动更新已有勾选，只在下次勾选时生效
}

// ========== 统计 ==========
function updateCount() {
  // 只统计 DOC 类型
  const activeCbs = document.querySelectorAll('#kb-' + (activeBookId || '') + ' .cb');
  let count = 0;
  activeCbs.forEach(c => {
    const nodeEl = c.closest('.tree-node');
    if (nodeEl && c.checked) count++;
  });
  document.getElementById('lblCount').textContent = '已选 ' + count + ' 篇';
  document.getElementById('btnDownload').disabled = count === 0;
}

// ========== 下载 ==========
async function startDownload() {
  if (!activeBookId) { log('⚠ 请先选择知识库'); return; }
  const data = kbsData[activeBookId];
  if (!data) { log('❌ 知识库数据未加载'); return; }

  const bookEl = document.getElementById('kb-' + activeBookId);
  const allCbs = bookEl.querySelectorAll('.tree-node .cb:checked');
  if (allCbs.length === 0) return;

  const uuids = [];
  allCbs.forEach(cb => {
    const node = cb.closest('.tree-node');
    if (node) uuids.push(node.dataset.uuid);
  });

  const kb = kbs.find(k => String(k.id) === activeBookId);
  if (!kb) { log('❌ 未找到知识库'); return; }

  const downloadResources = document.getElementById('chkResources').checked;
  const kbUrl = 'https://www.yuque.com/' + (kb.namespace || '?') + '/' + kb.slug;

  log('\n' + '═'.repeat(50));
  log('开始下载: ' + kb.name + ' (' + uuids.length + ' 篇)');

  const btnDl = document.getElementById('btnDownload');
  btnDl.disabled = true; btnDl.textContent = '下载中...';

  try {
    const resp = await fetch('/api/download', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, kbUrl, uuids, downloadResources }),
    });
    const result = await resp.json();
    if (!result.ok) throw new Error(result.error);

    const evtSource = new EventSource('/api/logs/' + result.taskId);
    evtSource.onmessage = (e) => {
      if (e.data === '__DONE__') { evtSource.close(); btnDl.disabled = false; btnDl.textContent = '下载已选文档'; return; }
      log(e.data);
    };
    evtSource.onerror = () => { evtSource.close(); btnDl.disabled = false; btnDl.textContent = '下载已选文档'; };
  } catch (e) {
    log('❌ ' + e.message);
    btnDl.disabled = false; btnDl.textContent = '下载已选文档';
  }
}
</script>
</body>
</html>
