<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuque2md - 语雀文档下载</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
  :root { --pico-font-size: 90%; }
  body { height: 100vh; display: flex; flex-direction: column; margin: 0; }
  header.container-fluid { padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin:0; max-width:none; background: var(--pico-card-background-color); }
  header h1 { font-size: 1.2em; white-space: nowrap; margin: 0; }
  header input { flex: 1; min-width: 0; max-width: 500px; }
  .main { flex: 1; display: flex; overflow: hidden; }
  .tree-panel { width: 380px; flex-shrink: 0; overflow-y: auto; padding: 12px; border-right: 1px solid var(--pico-muted-border-color); }
  .log-panel { flex: 1; overflow-y: auto; padding: 12px; font-family: 'Consolas','Courier New',monospace; font-size: .8em; background: var(--pico-card-background-color); color: var(--pico-color); white-space: pre-wrap; line-height: 1.5; border-left: 1px solid var(--pico-muted-border-color); }
  .log-panel::-webkit-scrollbar { width: 6px; }
  .log-panel::-webkit-scrollbar-thumb { background: var(--pico-muted-border-color); border-radius: 3px; }

  /* KB cards */
  .kb-card { padding: 8px 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; border: 1px solid var(--pico-muted-border-color); }
  .kb-card:hover { border-color: var(--pico-primary); }
  .kb-card .icon { font-size: 1.3em; cursor: pointer; }
  .kb-card .info { flex: 1; min-width: 0; cursor: pointer; }
  .kb-card .name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kb-card .meta { font-size: .8em; color: var(--pico-muted-color); }
  .kb-card .expand { font-size: 1.1em; color: var(--pico-muted-color); flex-shrink: 0; cursor: pointer; transition: transform .15s; }
  .kb-card .expand.open { transform: rotate(90deg); }

  /* Tree */
  .tree-children { padding-left: 20px; display: none; }
  .tree-children.expanded { display: block; }
  .tree-node { display: flex; align-items: center; gap: 4px; padding: 2px 4px; border-radius: 4px; cursor: pointer; font-size: .88em; }
  .tree-node:hover { background: var(--pico-card-background-color); }
  .tree-node .toggle { width: 16px; font-size: .65em; color: var(--pico-muted-color); text-align: center; flex-shrink: 0; user-select: none; }
  .tree-node .toggle.leaf { visibility: hidden; }
  .tree-node input[type=checkbox] { margin: 0; width: 15px; height: 15px; flex-shrink: 0; }
  .tree-node .node-icon { flex-shrink: 0; }
  .tree-node .node-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-node.folder .node-name { font-weight: 500; }

  /* Toolbar */
  .toolbar { padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; border-top: 1px solid var(--pico-muted-border-color); background: var(--pico-card-background-color); }
  .toolbar label { font-size: .9em; display: flex; align-items: center; gap: 4px; cursor: pointer; margin: 0; }
  .toolbar label input { margin: 0; }
  .toolbar .count { font-size: .85em; color: var(--pico-muted-color); min-width: 60px; }

  /* Misc */
  .placeholder { color: var(--pico-muted-color); padding: 40px 20px; text-align: center; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--pico-muted-border-color); border-top-color: var(--pico-primary); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-tree { padding: 4px 0; color: var(--pico-muted-color); font-size: .85em; }
  #btnConnect.loading { opacity: .6; pointer-events: none; }
  #btnConnect.done { --pico-primary: #2ecc71; pointer-events: none; }
  #btnDownload.running { background: #c0392b; border-color: #c0392b; cursor: pointer; }
  #btnDownload.running:hover { background: #e74c3c; }
  .kb-card input[type=checkbox] { margin: 0; }
  small.muted { color: var(--pico-muted-color); font-size: .85em; }
</style>
</head>
<body>
<header class="container-fluid">
  <h1>yuque2md</h1>
  <input id="token" type="password" placeholder="粘贴语雀 _yuque_session token">
  <button id="btnConnect" onclick="connect()">连接</button>
</header>
<div class="main">
  <div class="tree-panel" id="treePanel">
    <div class="placeholder">👆 输入 Token 连接语雀账号</div>
  </div>
  <div class="log-panel" id="logPanel"></div>
</div>
<div class="toolbar">
  <label><input type="checkbox" id="chkRecursive" checked> 🔄 递归选择</label>
  <label><input type="checkbox" id="chkResources"> 📦 下载静态资源</label>
  <label><input type="checkbox" id="chkSkipExisting" checked title="取消勾选则强制重新下载全部文件"> ⏭ 跳过已下载</label>
  <button id="btnSelectDir" onclick="selectDir()" class="secondary">📁 输出到: yuque_output</button>
  <span class="count" id="lblCount">已选 0 篇</span>
  <button id="btnDownload" onclick="startDownload()" disabled>下载已选文档</button>
</div>

<script>
let token = '';
let kbs = [];
let kbsData = {};
let activeBookId = null;
let selectedOutputDir = '';  // 用户自定义输出目录（空=默认 yuque_output）

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function log(msg) { const p = document.getElementById('logPanel'); p.textContent += msg + '\n'; p.scrollTop = p.scrollHeight; }

async function connect() {
  token = document.getElementById('token').value.trim();
  if (!token) return alert('请输入 Token');
  const btn = document.getElementById('btnConnect');
  btn.textContent = '连接中...'; btn.classList.add('loading');
  try {
    const resp = await fetch('/api/kbs', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error);
    kbs = data.kbs;
    btn.textContent = '已连接 ✓'; btn.classList.add('done');
    log('✅ 连接成功，共 ' + kbs.length + ' 个知识库');
    renderKbList();
  } catch (e) {
    btn.textContent = '重试'; btn.classList.remove('loading');
    log('❌ 连接失败: ' + e.message);
  }
}

async function selectDir() {
  const btn = document.getElementById('btnSelectDir');
  btn.textContent = '选择中...'; btn.disabled = true;
  try {
    const resp = await fetch('/api/select-folder', { method: 'POST' });
    const data = await resp.json();
    if (data.ok) {
      selectedOutputDir = data.path;
      btn.textContent = '📁 输出到: ' + data.path;
      btn.disabled = false;
      log('📁 输出目录: ' + data.path);
    } else {
      selectedOutputDir = '';
      btn.textContent = '📁 输出到: yuque_output';
      btn.disabled = false;
    }
  } catch (e) {
    selectedOutputDir = '';
    btn.textContent = '📁 输出到: yuque_output';
    btn.disabled = false;
  }
}

function renderKbList() {
  const panel = document.getElementById('treePanel');
  let html = '<div style="padding:0 0 8px;border-bottom:1px solid var(--pico-muted-border-color);margin-bottom:8px"><label style="cursor:pointer"><input type="checkbox" id="chkAllKbs" onchange="toggleAllKbs(this.checked)"> 全选所有知识库</label></div>';
  html += kbs.map(kb => {
    const ns = kb.namespace || '?';
    return '<div class="kb-card">' +
      '<input type="checkbox" class="kb-cb" id="kb-cb-' + kb.id + '" data-kbid="' + kb.id + '" data-ns="' + ns + '" data-slug="' + kb.slug + '" onclick="event.stopPropagation();toggleKbSelect(\'' + kb.id + '\')" title="全选此知识库">' +
      '<span class="icon" onclick="toggleKb(this.parentElement,\'' + kb.id + '\',\'' + ns + '\',\'' + kb.slug + '\')">📚</span>' +
      '<span class="info" onclick="toggleKb(this.parentElement,\'' + kb.id + '\',\'' + ns + '\',\'' + kb.slug + '\')"><div class="name">' + esc(kb.name) + '</div><div class="meta">' + (kb.items_count || '?') + ' 篇文档</div></span>' +
      '<span class="expand" id="exp-' + kb.id + '" onclick="toggleKb(this.parentElement,\'' + kb.id + '\',\'' + ns + '\',\'' + kb.slug + '\')">▶</span>' +
      '</div><div id="kb-' + kb.id + '" class="tree-children"></div>';
  }).join('');
  panel.innerHTML = html;
}

async function toggleKbSelect(bookId) {
  const kbCb = document.getElementById('kb-cb-' + bookId);
  if (!kbCb) return;
  if (!kbsData[bookId]) {
    const kb = kbs.find(k => String(k.id) === bookId);
    if (!kb) return;
    const kbUrl = 'https://www.yuque.com/' + (kb.namespace || '?') + '/' + kb.slug;
    try {
      const resp = await fetch('/api/toc', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, kbUrl }) });
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error);
      kbsData[bookId] = { tree: data.tree, kb: data.kb };
    } catch (e) {
      log('❌ 加载知识库失败: ' + e.message);
      kbCb.checked = false; return;
    }
  }
  const container = document.getElementById('kb-' + bookId);
  if (container && !container.querySelector('.cb')) container.innerHTML = renderTree(kbsData[bookId].tree, bookId);
  const checked = kbCb.checked;
  if (container) container.querySelectorAll('.cb').forEach(c => { c.checked = checked; });
  updateCount();
}

function toggleAllKbs(checked) {
  document.querySelectorAll('.kb-cb').forEach(c => { if (c.checked !== checked) { c.checked = checked; toggleKbSelect(c.dataset.kbid); } });
  updateCount();
}

async function toggleKb(card, bookId, namespace, slug) {
  const container = document.getElementById('kb-' + bookId);
  const expandEl = document.getElementById('exp-' + bookId);
  if (container.classList.contains('expanded')) { container.classList.remove('expanded'); expandEl.classList.remove('open'); return; }
  document.querySelectorAll('.kb-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active'); activeBookId = bookId;
  if (!kbsData[bookId]) {
    container.innerHTML = '<div class="loading-tree"><span class="spinner"></span>加载文档树...</div>';
    container.classList.add('expanded'); expandEl.classList.add('open');
    try {
      const kbUrl = 'https://www.yuque.com/' + namespace + '/' + slug;
      const resp = await fetch('/api/toc', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, kbUrl }) });
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error);
      kbsData[bookId] = { tree: data.tree, kb: data.kb };
      log('📖 已加载知识库 "' + data.kb.bookName + '"');
    } catch (e) {
      container.innerHTML = '<div class="placeholder">❌ ' + esc(e.message) + '</div>';
      return;
    }
  }
  container.innerHTML = renderTree(kbsData[bookId].tree, bookId);
  container.classList.add('expanded'); expandEl.classList.add('open');
}

function renderTree(nodes, bookId) { return nodes.map(n => renderNode(n, bookId)).join(''); }

function renderNode(node, bookId) {
  const isDoc = node.type === 'DOC';
  const nodeId = bookId + '-' + node.uuid;
  const hasChildren = node.children && node.children.length > 0;
  let html = '<div class="tree-node' + (isDoc ? '' : ' folder') + '" data-uuid="' + node.uuid + '" data-book="' + bookId + '">';
  html += '<span class="toggle' + (hasChildren ? '' : ' leaf') + '" onclick="event.stopPropagation();toggleNode(\'' + nodeId + '\')">' + (hasChildren ? '▶' : '') + '</span>';
  html += '<input type="checkbox" class="cb" id="cb-' + nodeId + '" data-nodeid="' + nodeId + '">';
  html += '<span class="node-icon">' + (isDoc ? '📄' : '📁') + '</span>';
  html += '<span class="node-name">' + esc(node.title) + (node.isDeduped ? ' <small class="muted">(' + node.uuid.slice(-8) + ')</small>' : '') + '</span>';
  html += '</div>';
  if (hasChildren) html += '<div id="ch-' + nodeId + '" class="tree-children">' + renderTree(node.children, bookId) + '</div>';
  return html;
}

function toggleNode(nodeId) {
  const children = document.getElementById('ch-' + nodeId);
  if (!children) return;
  const toggle = document.querySelector('#cb-' + nodeId).parentElement.querySelector('.toggle');
  if (children.classList.contains('expanded')) { children.classList.remove('expanded'); if (toggle) toggle.textContent = '▶'; }
  else { children.classList.add('expanded'); if (toggle) toggle.textContent = '▼'; }
}

function onCheck(nodeId) {
  const cb = document.getElementById('cb-' + nodeId);
  if (!cb) return;
  const recursive = document.getElementById('chkRecursive').checked;
  if (recursive) setChildrenCheckbox(nodeId, cb.checked);
  updateParentCheckbox(nodeId);
  updateCount();
}

function setChildrenCheckbox(nodeId, checked) {
  const container = document.getElementById('ch-' + nodeId);
  if (!container) return;
  container.querySelectorAll('.cb').forEach(c => {
    c.checked = checked;
    const parts = c.id.split('-');
    setChildrenCheckbox(parts.slice(0, -1).join('-') + '-' + parts[parts.length - 1], checked);
  });
}

function updateParentCheckbox(nodeId) {
  const cb = document.getElementById('cb-' + nodeId);
  const nodeEl = cb ? cb.closest('.tree-node') : null;
  if (!nodeEl) return;
  let parentContainer = nodeEl.closest('.tree-children');
  if (!parentContainer) return;
  const parentNode = parentContainer.parentElement.querySelector('.tree-node');
  if (!parentNode) return;
  const parentCb = parentNode.querySelector('.cb');
  if (!parentCb) return;
  const siblingCbs = parentContainer.querySelectorAll(':scope > .tree-node > .cb, :scope > div > .tree-node > .cb');
  let allChecked = true;
  siblingCbs.forEach(c => { if (!c.checked) allChecked = false; });
  parentCb.checked = allChecked;
  updateParentCheckbox(parentCb.id.replace('cb-', ''));
}

function updateCount() {
  let count = 0;
  document.querySelectorAll('.kb-cb:checked').forEach(kbCb => {
    const data = kbsData[kbCb.dataset.kbid];
    if (data) count += countDocs(data.tree);
  });
  document.querySelectorAll('.tree-node .cb:checked').forEach(cb => {
    const nodeEl = cb.closest('.tree-node');
    if (nodeEl) {
      const kbCb = document.getElementById('kb-cb-' + nodeEl.dataset.book);
      if (!kbCb || !kbCb.checked) count++;
    }
  });
  document.getElementById('lblCount').textContent = '已选 ' + count + ' 篇';
  document.getElementById('btnDownload').disabled = count === 0;
}

function countDocs(nodes) {
  let n = 0;
  for (const node of nodes) { if (node.type === 'DOC') n++; if (node.children) n += countDocs(node.children); }
  return n;
}

async function startDownload() {
  const downloadResources = document.getElementById('chkResources').checked;
  const btnDl = document.getElementById('btnDownload');
  // 如果正在下载，触发停止
  if (btnDl.classList.contains('running')) {
    cancelDownload();
    return;
  }
  let totalDocs = 0;
  const selectedKbs = [];
  document.querySelectorAll('.kb-cb:checked').forEach(kbCb => {
    const bookId = kbCb.dataset.kbid;
    const data = kbsData[bookId];
    if (data) { selectedKbs.push({ bookId, data, ns: kbCb.dataset.ns, slug: kbCb.dataset.slug, allUuids: collectAllUuids(data.tree) }); totalDocs += selectedKbs[selectedKbs.length - 1].allUuids.length; }
  });
  document.querySelectorAll('.tree-node .cb:checked').forEach(cb => {
    const nodeEl = cb.closest('.tree-node');
    if (!nodeEl) return;
    const bookId = nodeEl.dataset.book;
    if (document.getElementById('kb-cb-' + bookId)?.checked) return;
    let kbEntry = selectedKbs.find(k => k.bookId === bookId);
    if (!kbEntry) {
      const data = kbsData[bookId]; if (!data) return;
      kbEntry = { bookId, data, ns: document.getElementById('kb-cb-' + bookId)?.dataset.ns || '', slug: document.getElementById('kb-cb-' + bookId)?.dataset.slug || '', allUuids: [] };
      selectedKbs.push(kbEntry);
    }
    if (!kbEntry.allUuids.includes(nodeEl.dataset.uuid)) { kbEntry.allUuids.push(nodeEl.dataset.uuid); totalDocs++; }
  });
  if (selectedKbs.length === 0) { log('⚠ 请先选择要下载的文档或知识库'); return; }
  log('\n' + '═'.repeat(50));
  log('开始下载: ' + selectedKbs.length + ' 个知识库, ' + totalDocs + ' 篇');
  btnDl.classList.add('running');
  btnDl.textContent = '⏹ 停止下载';
  btnDl.disabled = false;

  for (const kbEntry of selectedKbs) {
    const { bookId, ns, slug, allUuids } = kbEntry;
    const kbUrl = 'https://www.yuque.com/' + ns + '/' + slug;
    const kbName = kbs.find(k => String(k.id) === bookId);
    log('  📚 ' + (kbName ? kbName.name : bookId) + ': ' + allUuids.length + ' 篇');
    try {
      const skipExisting = document.getElementById('chkSkipExisting').checked;
      const body = selectedOutputDir
        ? { token, kbUrl, uuids: allUuids, downloadResources, outputDir: selectedOutputDir, skipExisting }
        : { token, kbUrl, uuids: allUuids, downloadResources, skipExisting };
      const resp = await fetch('/api/download', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const result = await resp.json();
      if (!result.ok) throw new Error(result.error);
      currentTaskId = result.taskId;
      const evtSource = new EventSource('/api/logs/' + result.taskId);
      await new Promise((resolve) => {
        evtSource.onmessage = (e) => { if (e.data === '__DONE__') { evtSource.close(); resolve(); return; } log(e.data); };
        evtSource.onerror = () => { evtSource.close(); resolve(); };
      });
    } catch (e) { log('  ❌ ' + e.message); }
  }
  btnDl.classList.remove('running');
  btnDl.textContent = '下载已选文档';
  btnDl.disabled = false;
  currentTaskId = null;
}

let currentTaskId = null;
function cancelDownload() {
  if (!currentTaskId) return;
  fetch('/api/cancel/' + currentTaskId, { method: 'POST' });
  const btnDl = document.getElementById('btnDownload');
  btnDl.classList.remove('running');
  btnDl.textContent = '下载已选文档';
  btnDl.disabled = false;
  currentTaskId = null;
  log('⏹ 正在取消...');
}
}

function collectAllUuids(nodes) {
  let uuids = [];
  for (const node of nodes) { if (node.type === 'DOC') uuids.push(node.uuid); if (node.children) uuids = uuids.concat(collectAllUuids(node.children)); }
  return uuids;
}

document.getElementById('treePanel').addEventListener('click', function(e) {
  if (e.target.classList.contains('cb')) {
    const nodeId = e.target.dataset.nodeid;
    if (nodeId) {
      if (document.getElementById('chkRecursive').checked) {
        const container = document.getElementById('ch-' + nodeId);
        if (container) container.querySelectorAll('.cb').forEach(c => { c.checked = e.target.checked; });
      }
      updateCount();
    }
  }
});
</script>
</body>
</html>
